<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Analytical Tension Model Explorer</title>
  <style>
    html, body, #app { margin: 0; width: 100%; height: 100%; min-height: 100vh; background: #f5f7fb; }
    #app { border: 0; display: block; }
    #loading { min-height: 100vh; display: grid; place-items: center; font: 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #18202f; }
  </style>
</head>
<body>
  <div id="loading">Loading analytical model explorer...</div>
  <iframe id="app" title="Analytical Tension Model Explorer" hidden></iframe>
  <script>
    const source = "https://raw.githubusercontent.com/saientropy/rando/master/analytical-model-explorer/index.html";
    fetch(source)
      .then((response) => {
        if (!response.ok) throw new Error("Could not load source page");
        return response.text();
      })
      .then((html) => {
        html = html.replace(
          "const power = Math.pow(10, Math.floor(Math.log10(raw)));\n      const niceFraction",
          "const power = Math.pow(10, Math.floor(Math.log10(raw)));\n      const fraction = raw / power;\n      const niceFraction"
        );
        const frame = document.getElementById("app");
        frame.srcdoc = html;
        frame.hidden = false;
        document.getElementById("loading").remove();
      })
      .catch((error) => {
        document.getElementById("loading").textContent = "Could not load page: " + error.message;
      });
  </script>
</body>
</html>
